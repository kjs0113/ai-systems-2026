# Kubernetes Pod with nodeAffinity for MIG Profile Scheduling
# 특정 MIG 프로파일이 있는 노드에만 Pod을 스케줄링한다.
---
apiVersion: v1
kind: Pod
metadata:
  name: mig-student-pod
  namespace: ai-class
  labels:
    app: student-agent
    mig-profile: 1g.10gb
spec:
  # nodeAffinity: 특정 MIG 프로파일을 가진 노드에만 스케줄링
  affinity:
    nodeAffinity:
      requiredDuringSchedulingIgnoredDuringExecution:
        nodeSelectorTerms:
          - matchExpressions:
              # nvidia.com/mig.profile 레이블로 MIG 지원 노드 필터링
              - key: nvidia.com/mig.strategy
                operator: In
                values:
                  - single   # single 또는 mixed strategy
                  - mixed
              # MIG 1g.10gb 프로파일이 있는 노드만 선택
              - key: nvidia.com/gpu.product
                operator: In
                values:
                  - NVIDIA-H100-80GB-HBM3-MIG-1g.10gb
              # DGX 클러스터 노드 선택
              - key: kubernetes.io/hostname
                operator: In
                values:
                  - dgx-node-01
                  - dgx-node-02
      # 선호 조건: GPU 메모리가 충분한 노드 우선
      preferredDuringSchedulingIgnoredDuringExecution:
        - weight: 100
          preference:
            matchExpressions:
              - key: nvidia.com/mig.capable
                operator: In
                values:
                  - "true"
  containers:
    - name: student-agent
      image: pytorch/pytorch:2.5.0-cuda12.4-cudnn9-devel
      resources:
        limits:
          nvidia.com/mig-1g.10gb: "1"   # MIG 1g.10gb 슬라이스 1개 요청
        requests:
          nvidia.com/mig-1g.10gb: "1"
          memory: "8Gi"
          cpu: "4"
      env:
        - name: NVIDIA_VISIBLE_DEVICES
          value: "all"
        - name: CUDA_MPS_PIPE_DIRECTORY
          value: /tmp/nvidia-mps
        - name: ANTHROPIC_API_KEY
          valueFrom:
            secretKeyRef:
              name: api-keys
              key: anthropic-key
      volumeMounts:
        - name: workspace
          mountPath: /workspace
        - name: shm
          mountPath: /dev/shm
      command: ["sleep", "infinity"]
  volumes:
    - name: workspace
      persistentVolumeClaim:
        claimName: student-workspace-pvc
    - name: shm
      emptyDir:
        medium: Memory
        sizeLimit: 4Gi
  restartPolicy: Never
  tolerations:
    - key: nvidia.com/gpu
      operator: Exists
      effect: NoSchedule

---
# 3g.40gb 프로파일 노드에 스케줄링하는 Pod (대형 모델용)
apiVersion: v1
kind: Pod
metadata:
  name: mig-research-pod
  namespace: ai-class
  labels:
    app: research-agent
    mig-profile: 3g.40gb
spec:
  affinity:
    nodeAffinity:
      requiredDuringSchedulingIgnoredDuringExecution:
        nodeSelectorTerms:
          - matchExpressions:
              - key: nvidia.com/mig.strategy
                operator: In
                values:
                  - mixed
              - key: nvidia.com/gpu.product
                operator: In
                values:
                  - NVIDIA-H100-80GB-HBM3-MIG-3g.40gb
  containers:
    - name: research-agent
      image: pytorch/pytorch:2.5.0-cuda12.4-cudnn9-devel
      resources:
        limits:
          nvidia.com/mig-3g.40gb: "1"   # MIG 3g.40gb 슬라이스 1개 요청
        requests:
          nvidia.com/mig-3g.40gb: "1"
          memory: "32Gi"
          cpu: "8"
      env:
        - name: NVIDIA_VISIBLE_DEVICES
          value: "all"
      volumeMounts:
        - name: workspace
          mountPath: /workspace
      command: ["sleep", "infinity"]
  volumes:
    - name: workspace
      persistentVolumeClaim:
        claimName: research-workspace-pvc
  restartPolicy: Never
  tolerations:
    - key: nvidia.com/gpu
      operator: Exists
      effect: NoSchedule
